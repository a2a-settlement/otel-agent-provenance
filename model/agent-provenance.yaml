groups:
  - id: registry.agent.provenance
    type: attribute_group
    display_name: Agent Provenance Attributes
    brief: >
      Attributes for agent output provenance, covering self-declared,
      signed, and verifiable attestation tiers.
    attributes:
      # --- Identity ---
      - id: agent.id
        type: string
        brief: Unique agent identifier.
        examples: ["agent-abc123", "asst_5j66UpCpwteGg4YSxUnt7lPY"]
        requirement_level: required

      - id: agent.identity.tier
        type: int
        brief: >
          KYA (Know Your Agent) identity verification tier.
          1 = self-declared, 2 = organisational/signed, 3 = auditable/verifiable.
        examples: [1, 2, 3]
        requirement_level:
          conditionally_required: when agent identity verification is performed

      - id: agent.identity.registry
        type: string
        brief: Registry that issued or verified the agent identity.
        examples: ["a2a-settlement.org", "agent-registry.example.com"]
        requirement_level: recommended

      # --- Tier 1: Self-Declared Output Provenance ---
      - id: agent.output.provenance.tier
        type: int
        brief: >
          Provenance attestation tier of this output.
          1 = self-declared, 2 = signed/hash-verified, 3 = verifiable callback.
        examples: [1, 2, 3]
        requirement_level: required

      - id: agent.output.source.type
        type:
          allow_custom_values: true
          members:
            - id: model_generation
              value: model_generation
              brief: Output generated by a model.
            - id: retrieval
              value: retrieval
              brief: Output derived from retrieved documents.
            - id: tool_call
              value: tool_call
              brief: Output produced by a tool invocation.
            - id: agent_delegation
              value: agent_delegation
              brief: Output produced by a delegated agent.
            - id: hybrid
              value: hybrid
              brief: Output from multiple source types.
        brief: How the agent produced this output.
        requirement_level: required

      - id: agent.output.source.uri
        type: string[]
        brief: URIs of sources that influenced this output.
        examples: [["https://en.wikipedia.org/wiki/France", "https://data.gov/gdp"]]
        requirement_level: recommended

      - id: agent.output.source.influence
        type:
          allow_custom_values: true
          members:
            - id: attended
              value: attended
              brief: Source was in the model context window and influenced output.
            - id: cited
              value: cited
              brief: Source is explicitly cited in the output.
            - id: ignored
              value: ignored
              brief: Source was retrieved but not used.
        brief: >
          How each source influenced the output. Addresses the RAG
          retrieval-to-generation gap where retrieved results may not
          actually influence the final output.
        requirement_level: recommended

      - id: agent.output.confidence
        type: double
        brief: Model-reported or calibrated confidence score (0.0 to 1.0).
        examples: [0.92, 0.75]
        requirement_level: recommended

      - id: agent.output.model.name
        type: string
        brief: Name of the model that produced the output.
        examples: ["gpt-4o", "claude-sonnet-4-20250514", "gemini-2.5-flash"]
        requirement_level: recommended

      - id: agent.output.model.version
        type: string
        brief: Specific version or checkpoint of the model.
        examples: ["2025-05-01", "v1.2.3"]
        requirement_level: recommended

      - id: agent.output.grounding.coverage
        type: double
        brief: >
          Fraction of the output text grounded by source evidence (0.0 to 1.0).
          Computed from grounding supports segment coverage.
        examples: [0.85, 0.42]
        requirement_level: recommended

      - id: agent.output.grounding.source_count
        type: int
        brief: Number of distinct sources backing this output.
        examples: [3, 7]
        requirement_level: recommended

      - id: agent.output.grounding.domain_count
        type: int
        brief: Number of distinct domains across grounding sources.
        examples: [2, 5]
        requirement_level: recommended

      # --- Tier 2: Signed / Hash-Verified ---
      - id: agent.output.hash.algorithm
        type:
          allow_custom_values: true
          members:
            - id: sha256
              value: sha256
            - id: sha3_256
              value: sha3-256
            - id: sha384
              value: sha384
            - id: sha512
              value: sha512
        brief: Hash algorithm used on the deliverable content.
        requirement_level:
          conditionally_required: when provenance tier >= 2

      - id: agent.output.hash.value
        type: string
        brief: Hex-encoded hash of the deliverable content.
        examples: ["a3f2b8c..."]
        requirement_level:
          conditionally_required: when provenance tier >= 2

      - id: agent.output.signature.method
        type:
          allow_custom_values: true
          members:
            - id: hmac
              value: hmac
            - id: ed25519
              value: ed25519
            - id: x509
              value: x509
        brief: Signature method used to sign the output.
        requirement_level:
          conditionally_required: when provenance tier >= 2

      - id: agent.output.signature.value
        type: string
        brief: Base64-encoded signature bytes.
        requirement_level:
          conditionally_required: when provenance tier >= 2 and signature method is set

      - id: agent.output.signature.key_id
        type: string
        brief: Reference to the signing key (DID fragment, key ID, etc.).
        examples: ["did:web:agent.example.com#key-1"]
        requirement_level:
          conditionally_required: when provenance tier >= 2 and signature method is set

      # --- Tier 2/3: Attestation ---
      - id: agent.provenance.attestation.uri
        type: string
        brief: >
          URI of the attestation record on the verification backend
          (e.g. the A2A-SE exchange).
        examples: ["https://exchange.a2a-settlement.org/attestation/abc123"]
        requirement_level:
          conditionally_required: when provenance tier >= 2

      - id: agent.provenance.attestation.timestamp
        type: string
        brief: RFC 3339 timestamp of the attestation (RFC 3161-compatible).
        examples: ["2026-03-11T14:30:00Z"]
        requirement_level:
          conditionally_required: when provenance tier >= 2

      # --- Tier 3: Verifiable Source Callback ---
      - id: agent.provenance.callback.uri
        type: string
        brief: Endpoint for live verification of provenance claims.
        examples: ["https://exchange.a2a-settlement.org/verify/abc123"]
        requirement_level:
          conditionally_required: when provenance tier = 3

      - id: agent.provenance.callback.method
        type:
          members:
            - id: get
              value: GET
            - id: post
              value: POST
        brief: HTTP method for the callback endpoint.
        requirement_level:
          conditionally_required: when callback URI is set

      - id: agent.provenance.callback.status
        type:
          members:
            - id: verified
              value: verified
              brief: Callback confirmed provenance is valid.
            - id: expired
              value: expired
              brief: Attestation has expired.
            - id: revoked
              value: revoked
              brief: Attestation was revoked.
        brief: Result of the most recent callback verification.
        requirement_level: recommended

      # --- Provenance Chain (multi-hop) ---
      - id: agent.provenance.chain.parent_span_id
        type: string
        brief: Span ID of the parent agent's output span in the provenance chain.
        requirement_level: recommended

      - id: agent.provenance.chain.depth
        type: int
        brief: Number of agent hops from the original task to this output.
        examples: [0, 1, 3]
        requirement_level: recommended

      - id: agent.provenance.chain.root_task_id
        type: string
        brief: Task or bounty ID of the original request at chain depth 0.
        examples: ["task-xyz-789", "bounty-2026-001"]
        requirement_level: recommended

      # --- Attestation TTL & Lifecycle ---
      - id: agent.provenance.attestation.id
        type: string
        brief: Unique identifier of the attestation record.
        requirement_level: recommended

      - id: agent.provenance.attestation.type
        type:
          allow_custom_values: false
          members:
            - id: identity
              value: identity
              brief: KYA identity verification attestation (365-day max TTL).
            - id: reputation
              value: reputation
              brief: EMA reputation score attestation (90-day rolling window).
            - id: transaction
              value: transaction
              brief: Settlement proof attestation (permanent, no TTL).
            - id: capability
              value: capability
              brief: Agent capability attestation (180-day max TTL).
        brief: The attestation category, governing TTL tier defaults.
        requirement_level: recommended

      - id: agent.provenance.attestation.issued_at
        type: string
        brief: RFC 3339 timestamp when the attestation was issued.
        examples: ["2026-03-16T12:00:00Z"]
        requirement_level: recommended

      - id: agent.provenance.attestation.expires_at
        type: string
        brief: RFC 3339 timestamp when the attestation expires. Absent for permanent attestations.
        examples: ["2027-03-16T12:00:00Z"]
        requirement_level: recommended

      - id: agent.provenance.attestation.ttl_remaining_s
        type: double
        brief: Seconds remaining until the attestation expires.
        examples: [86400.0, 0.0]
        requirement_level: recommended

      - id: agent.provenance.attestation.revoked_at
        type: string
        brief: RFC 3339 timestamp when the attestation was revoked.
        requirement_level: opt_in

      - id: agent.provenance.attestation.revocation_reason
        type:
          allow_custom_values: false
          members:
            - id: key_compromise
              value: key_compromise
            - id: erroneous_issuance
              value: erroneous_issuance
            - id: deregistration
              value: deregistration
            - id: policy_violation
              value: policy_violation
        brief: Reason for attestation revocation.
        requirement_level: opt_in

      - id: agent.provenance.attestation.renewal_chain_depth
        type: int
        brief: How many times this attestation lineage has been renewed.
        examples: [0, 3, 12]
        requirement_level: opt_in

      - id: agent.provenance.attestation.status
        type:
          allow_custom_values: false
          members:
            - id: active
              value: active
            - id: expired
              value: expired
            - id: revoked
              value: revoked
            - id: renewed
              value: renewed
        brief: Current lifecycle status of the attestation.
        requirement_level: recommended

      - id: agent.provenance.attestation.event
        type:
          allow_custom_values: false
          members:
            - id: issued
              value: issued
            - id: expired
              value: expired
            - id: revoked
              value: revoked
            - id: renewed
              value: renewed
            - id: ttl_warning
              value: ttl_warning
        brief: The lifecycle event captured by this span.
        requirement_level: required
